<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QP 라임 블랙 아이콘 샘플</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Pretendard, "Apple SD Gothic Neo", "Segoe UI", Arial, sans-serif;
      background: #f1f5f9;
      color: #101010;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px 13px 34px;
      background:
        linear-gradient(180deg, #ffffff 0%, #eef2f7 45%, #d9e2ec 100%);
    }

    main {
      width: min(100%, 980px);
      margin: 0 auto;
    }

    header {
      padding: 4px 4px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.16;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .sample {
      padding: 12px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 8px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
    }

    .icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 22%;
      overflow: hidden;
      background: #b7ff2a;
      color: #070707;
      user-select: none;
      isolation: isolate;
      container-type: inline-size;
    }

    .icon::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    .letters {
      position: relative;
      z-index: 2;
      display: block;
      font-family: Impact, Pretendard, "Arial Black", Arial, sans-serif;
      font-size: clamp(42px, 50cqw, 118px);
      font-weight: 1000;
      line-height: 0.86;
      letter-spacing: 0;
      transform: scaleX(1);
      max-width: 86%;
      text-align: center;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
    }

    .name {
      color: #101010;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.25;
    }

    .note {
      color: #64748b;
      font-size: 11px;
      line-height: 1.25;
      text-align: right;
      white-space: nowrap;
    }

    .s1 .icon {
      box-shadow: inset 0 0 0 5px #070707;
    }

    .s1 .letters {
      text-shadow: 0 5px 0 rgba(0, 0, 0, 0.18);
    }

    .s1 .icon::after {
      box-shadow: inset 0 -28px 54px rgba(0, 0, 0, 0.13);
    }

    .s2 .icon {
      background: linear-gradient(145deg, #d7ff45 0%, #a8f20e 52%, #7fcf00 100%);
      box-shadow: inset 0 0 0 3px rgba(7, 7, 7, 0.82);
    }

    .s2 .letters {
      text-shadow: 0 7px 0 rgba(255, 255, 255, 0.24);
    }

    .s3 .icon {
      background:
        linear-gradient(90deg, rgba(7, 7, 7, 0.12) 0 2px, transparent 2px 19px),
        #b7ff2a;
      box-shadow: inset 0 0 0 4px #070707;
    }

    .s3 .letters {
      font-style: italic;
      transform: skewX(-6deg) scaleX(0.96);
    }

    .s4 .icon {
      background: #b7ff2a;
    }

    .s4 .icon::before {
      content: "";
      position: absolute;
      inset: 10%;
      z-index: 1;
      border: 6px solid rgba(7, 7, 7, 0.9);
      border-radius: 18%;
    }

    .s4 .letters {
      font-size: clamp(42px, 48cqw, 112px);
    }

    .s5 .icon {
      background:
        radial-gradient(circle at 30% 18%, rgba(255, 255, 255, 0.55), transparent 25%),
        linear-gradient(160deg, #cfff34 0%, #a7ee11 68%, #77c900 100%);
      box-shadow: inset 0 0 0 2px rgba(7, 7, 7, 0.7);
    }

    .s5 .letters {
      text-shadow:
        3px 3px 0 rgba(255, 255, 255, 0.3),
        0 9px 12px rgba(0, 0, 0, 0.18);
    }

    .s6 .icon {
      background: #b7ff2a;
      border-radius: 16%;
      box-shadow:
        inset 0 0 0 7px #070707,
        inset 0 0 0 14px #b7ff2a;
    }

    .s6 .letters {
      font-size: clamp(70px, 30vw, 162px);
    }

    .s7 .icon {
      place-items: end center;
      background: linear-gradient(180deg, #cfff37 0%, #b7ff2a 55%, #88dc00 100%);
      box-shadow: inset 0 0 0 4px #070707;
    }

    .s7 .letters {
      padding-bottom: 15%;
      font-size: clamp(42px, 48cqw, 112px);
      line-height: 0.84;
    }

    .s8 .icon {
      background:
        linear-gradient(135deg, transparent 0 48%, rgba(7, 7, 7, 0.11) 48% 52%, transparent 52% 100%),
        #b7ff2a;
      box-shadow: inset 0 0 0 4px #070707;
    }

    .s8 .letters {
      -webkit-text-stroke: 2px #070707;
      color: #111111;
      text-shadow: 0 0 0 #070707;
    }

    .s9 .icon {
      background: #b7ff2a;
      box-shadow:
        inset 0 0 0 4px #070707,
        inset 16px 16px 0 rgba(255, 255, 255, 0.26),
        inset -16px -16px 0 rgba(0, 0, 0, 0.11);
    }

    .s9 .letters {
      font-size: clamp(42px, 50cqw, 118px);
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.14);
    }

    .s10 .icon {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36) 0 35%, transparent 35%),
        #b7ff2a;
      box-shadow: inset 0 0 0 5px #070707;
    }

    .s10 .letters {
      font-family: Pretendard, "Arial Black", Arial, sans-serif;
      font-size: clamp(40px, 46cqw, 108px);
      font-weight: 1000;
      letter-spacing: 0;
      transform: scaleX(1.04);
    }

    @media (min-width: 720px) {
      body {
        padding: 32px 24px 48px;
      }

      .grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 16px;
      }

      h1 {
        font-size: 30px;
      }

      .letters {
        font-size: clamp(48px, 50cqw, 118px);
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>QP 라임 블랙 아이콘 샘플 10개</h1>
      <p>색은 라임/블랙으로 고정하고, QP를 더 크고 굵게 키웠습니다. 홈 화면에서 한눈에 박히는 쪽을 기준으로 보면 됩니다.</p>
    </header>

    <section class="grid" aria-label="QP 라임 블랙 아이콘 스타일 샘플">
      <article class="sample s1">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">두꺼운 외곽</div><div class="note">기본형</div></div>
      </article>

      <article class="sample s2">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">그라데이션</div><div class="note">앱스토어형</div></div>
      </article>

      <article class="sample s3">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">속도감</div><div class="note">사선 글자</div></div>
      </article>

      <article class="sample s4">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">프레임</div><div class="note">박스감</div></div>
      </article>

      <article class="sample s5">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">하이라이트</div><div class="note">입체감</div></div>
      </article>

      <article class="sample s6">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">스퀘어</div><div class="note">단단함</div></div>
      </article>

      <article class="sample s7">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">하단 밀착</div><div class="note">꽉 찬 느낌</div></div>
      </article>

      <article class="sample s8">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">대각 질감</div><div class="note">기계적</div></div>
      </article>

      <article class="sample s9">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">눌림감</div><div class="note">버튼형</div></div>
      </article>

      <article class="sample s10">
        <div class="icon"><div class="letters">QP</div></div>
        <div class="meta"><div class="name">넓은 글자</div><div class="note">가독성</div></div>
      </article>
    </section>
  </main>
</body>
</html>
